name: Keep Render backend warm

# Pings /health every 12 min to prevent Render free-tier from spinning
# down the container during long X agent sweeps. 12-min interval stays
# below Render's ~15-min idle threshold with a 3-min buffer, and keeps
# total GitHub Actions minutes within the 2000/month free allowance.

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render if idle
        run: |
          curl -fsS --max-time 90 "${{ secrets.X_BACKEND_URL }}/health" || echo "Ping failed but not failing job"
